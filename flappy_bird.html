<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  .game-wrapper {
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    border-radius: 8px;
  }
  canvas {
    display: block;
    border-radius: 8px;
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 400, H = 600;

// Constants
const GRAVITY = 0.45;
const FLAP_VELOCITY = -7.5;
const PIPE_WIDTH = 50;
const PIPE_SPEED = 3.5;
const PIPE_GAP = 120;
const PIPE_SPAWN_INTERVAL = 1500;
const GROUND_HEIGHT = 50;
const BIRD_SIZE = 30;

// Game states
const STATE_READY = 0;
const STATE_PLAYING = 1;
const STATE_OVER = 2;

class Bird {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = 80;
    this.y = H / 2;
    this.vel = 0;
    this.rotation = 0;
    this.size = BIRD_SIZE;
  }

  flap() {
    this.vel = FLAP_VELOCITY;
  }

  update() {
    this.vel += GRAVITY;
    this.y += this.vel;

    // Clamp rotation based on velocity
    if (this.vel < -2) {
      this.rotation = -25;
    } else if (this.vel > 2) {
      this.rotation = Math.min(90, this.rotation + 4);
    } else {
      this.rotation *= 0.9;
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x + this.size / 2, this.y + this.size / 2);
    ctx.rotate((this.rotation * Math.PI) / 180);

    // Body
    ctx.fillStyle = '#f5c842';
    ctx.strokeStyle = '#d4a017';
    ctx.lineWidth = 2;
    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
    ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);

    // Eye
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(5, -5, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Pupil
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(7, -5, 3.5, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#e85d04';
    ctx.beginPath();
    ctx.moveTo(15, 0);
    ctx.lineTo(25, -2);
    ctx.lineTo(25, 4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  getBounds() {
    return {
      x: this.x,
      y: this.y,
      w: this.size,
      h: this.size
    };
  }
}

class Pipe {
  constructor(x) {
    this.x = x;
    this.width = PIPE_WIDTH;
    this.gapY = 100 + Math.random() * (H - GROUND_HEIGHT - 240);
    this.gapHeight = PIPE_GAP;
    this.passed = false;
  }

  update() {
    this.x -= PIPE_SPEED;
  }

  draw(ctx) {
    const pipeColor = '#73bf2e';
    const pipeBorder = '#4a7d1c';
    const pipeHighlight = '#8ed13c';

    // Top pipe
    ctx.fillStyle = pipeColor;
    ctx.strokeStyle = pipeBorder;
    ctx.lineWidth = 3;
    this.drawRoundedRect(ctx, this.x, 0, this.width, this.gapY);
    ctx.fill();
    ctx.stroke();

    // Top pipe lip
    ctx.fillStyle = pipeHighlight;
    ctx.strokeStyle = pipeBorder;
    ctx.fillRect(this.x - 4, this.gapY - 20, this.width + 8, 20);
    ctx.strokeRect(this.x - 4, this.gapY - 20, this.width + 8, 20);

    // Bottom pipe
    ctx.fillStyle = pipeColor;
    ctx.strokeStyle = pipeBorder;
    const bottomY = this.gapY + this.gapHeight;
    this.drawRoundedRect(ctx, this.x, bottomY, this.width, H - bottomY - GROUND_HEIGHT);
    ctx.fill();
    ctx.stroke();

    // Bottom pipe lip
    ctx.fillStyle = pipeHighlight;
    ctx.strokeStyle = pipeBorder;
    ctx.fillRect(this.x - 4, this.gapY + this.gapHeight, this.width + 8, 20);
    ctx.strokeRect(this.x - 4, this.gapY + this.gapHeight, this.width + 8, 20);
  }

  drawRoundedRect(ctx, x, y, w, h) {
    const r = 4;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  getBoundsTop() {
    return { x: this.x, y: 0, w: this.width, h: this.gapY };
  }

  getBoundsBottom() {
    const bottomY = this.gapY + this.gapHeight;
    return { x: this.x, y: bottomY, w: this.width, h: H - bottomY - GROUND_HEIGHT };
  }
}

class Game {
  constructor() {
    this.state = STATE_READY;
    this.bird = new Bird();
    this.pipes = [];
    this.score = 0;
    this.highScore = parseInt(localStorage.getItem('flappyHighScore')) || 0;
    this.frameCount = 0;
    this.lastPipeSpawn = 0;
    this.hoverAngle = 0;
    this.hoverBaseY = this.bird.y;
  }

  reset() {
    this.bird.reset();
    this.pipes = [];
    this.score = 0;
    this.frameCount = 0;
    this.lastPipeSpawn = 0;
    this.state = STATE_READY;
  }

  startGame() {
    this.bird.reset();
    this.pipes = [];
    this.score = 0;
    this.frameCount = 0;
    this.lastPipeSpawn = Date.now();
    this.state = STATE_PLAYING;
  }

  flap() {
    if (this.state === STATE_READY) {
      this.startGame();
    } else if (this.state === STATE_PLAYING) {
      this.bird.flap();
    } else if (this.state === STATE_OVER) {
      this.reset();
    }
  }

  spawnPipe() {
    const lastPipe = this.pipes[this.pipes.length - 1];
    const minSpacing = 200;
    if (lastPipe && lastPipe.x > W - minSpacing) return;
    this.pipes.push(new Pipe(W));
  }

  update() {
    if (this.state === STATE_READY) {
      this.hoverAngle += 0.03;
      this.bird.y = this.hoverBaseY + Math.sin(this.hoverAngle) * 8;
      return;
    }

    if (this.state === STATE_PLAYING) {
      this.frameCount++;
      this.bird.update();

      // Spawn pipes
      const now = Date.now();
      if (now - this.lastPipeSpawn > PIPE_SPAWN_INTERVAL) {
        this.lastPipeSpawn = now;
        this.spawnPipe();
      }

      // Update pipes and check score
      for (let i = this.pipes.length - 1; i >= 0; i--) {
        const pipe = this.pipes[i];
        pipe.update();

        // Score check
        if (!pipe.passed && pipe.x + pipe.width < this.bird.x) {
          pipe.passed = true;
          this.score++;
        }

        // Remove off-screen pipes
        if (pipe.x + pipe.width < 0) {
          this.pipes.splice(i, 1);
        }
      }

      // Collision detection
      if (this.checkCollision()) {
        this.gameOver();
      }
    }
  }

  checkCollision() {
    const b = this.bird.getBounds();

    // Ground collision
    if (b.y + b.h > H - GROUND_HEIGHT) {
      return true;
    }

    // Top boundary
    if (b.y < 0) {
      return true;
    }

    // Pipe collisions
    for (const pipe of this.pipes) {
      const top = pipe.getBoundsTop();
      const bottom = pipe.getBoundsBottom();

      if (this.rectCollide(b, top) || this.rectCollide(b, bottom)) {
        return true;
      }
    }

    return false;
  }

  rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  gameOver() {
    this.state = STATE_OVER;
    if (this.score > this.highScore) {
      this.highScore = this.score;
      localStorage.setItem('flappyHighScore', this.highScore);
    }
  }

  draw() {
    this.drawBackground();
    this.drawGround();

    if (this.state === STATE_PLAYING || this.state === STATE_OVER) {
      for (const pipe of this.pipes) {
        pipe.draw(ctx);
      }
    }

    this.bird.draw(ctx);
    this.drawScore();

    if (this.state === STATE_READY) {
      this.drawGetReady();
    }

    if (this.state === STATE_OVER) {
      this.drawGameOver();
    }
  }

  drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_HEIGHT);
    grad.addColorStop(0, '#87CEEB');
    grad.addColorStop(1, '#B0E0E6');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H - GROUND_HEIGHT);
  }

  drawGround() {
    // Brown ground
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, H - GROUND_HEIGHT, W, GROUND_HEIGHT);

    // Green grass
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(0, H - GROUND_HEIGHT, W, 8);

    // Grass tufts
    ctx.fillStyle = '#388E3C';
    for (let i = 0; i < W; i += 20) {
      ctx.fillRect(i, H - GROUND_HEIGHT - 4, 3, 12);
    }
  }

  drawScore() {
    if (this.state === STATE_READY) return;

    ctx.save();
    ctx.font = 'bold 48px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    // Shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
    ctx.fillText(this.score.toString(), W / 2 + 3, 23);

    // Score text
    ctx.fillStyle = 'white';
    ctx.fillText(this.score.toString(), W / 2, 20);

    ctx.restore();
  }

  drawGetReady() {
    ctx.save();

    // Overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, W, H);

    // Get Ready text
    ctx.font = 'bold 40px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
    ctx.fillText('Get Ready!', W / 2 + 3, H / 2 - 100 + 3);

    ctx.fillStyle = 'white';
    ctx.fillText('Get Ready!', W / 2, H / 2 - 100);

    // Tap instruction
    ctx.font = '20px Arial, sans-serif';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillText('Click or Press Space', W / 2 + 2, H / 2 + 2);
    ctx.fillStyle = '#555';
    ctx.fillText('Click or Press Space', W / 2, H / 2);

    // High score
    if (this.highScore > 0) {
      ctx.font = '18px Arial, sans-serif';
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fillText(`Best: ${this.highScore}`, W / 2 + 2, H / 2 + 40 + 2);
      ctx.fillStyle = '#666';
      ctx.fillText(`Best: ${this.highScore}`, W / 2, H / 2 + 40);
    }

    ctx.restore();
  }

  drawGameOver() {
    ctx.save();

    // Semi-transparent overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(0, 0, W, H);

    // Box background
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    const boxW = 280, boxH = 200;
    const boxX = (W - boxW) / 2, boxY = (H - boxH) / 2 - 30;
    ctx.beginPath();
    ctx.roundRect(boxX, boxY, boxW, boxH, 12);
    ctx.fill();

    // Game Over text
    ctx.font = 'bold 42px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillText('Game Over', W / 2 + 3, boxY + 50 + 3);

    ctx.fillStyle = '#e74c3c';
    ctx.fillText('Game Over', W / 2, boxY + 50);

    // Score text
    ctx.font = '22px Arial, sans-serif';
    ctx.fillStyle = 'white';
    ctx.fillText(`Score: ${this.score}`, W / 2, boxY + 110);

    // High score
    ctx.fillStyle = this.score >= this.highScore && this.score > 0 ? '#f1c40f' : '#ccc';
    ctx.fillText(`Best: ${this.highScore}`, W / 2, boxY + 145);

    // Restart text
    ctx.font = '18px Arial, sans-serif';
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.fillText('Click or Press Space to Restart', W / 2, boxY + 185);

    ctx.restore();
  }
}

const game = new Game();

// Check for roundRect support
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (r > w / 2) r = w / 2;
    if (r > h / 2) r = h / 2;
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    return this;
  };
}

function gameLoop() {
  game.update();
  game.draw();
  requestAnimationFrame(gameLoop);
}

// Event listeners
canvas.addEventListener('click', () => game.flap());
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  game.flap();
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.key === ' ' || e.key === 'ArrowUp') {
    e.preventDefault();
    game.flap();
  }
});

// Prevent page scroll on space
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.key === ' ' || e.key === 'ArrowUp') {
    e.preventDefault();
  }
}, { passive: false });

gameLoop();
</script>
</body>
</html>
